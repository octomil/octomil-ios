name: Contract Conformance

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  conformance:
    uses: octomil/octomil-contracts/.github/workflows/sdk-conformance.yml@v1.23.0
    with:
      sdk: ios
      contract-version: "1.23.0"
      codegen-command: "python3 .contract/scripts/sync_generated.py --sdk ios --check --target-dir Sources/Octomil/Generated"
      # macOS destination rather than iOS Simulator: GitHub-hosted runners ship without
      # any iOS Simulator runtime installed — even 'Any iOS Simulator Device' fails
      # because the placeholder entry is not a usable runtime. xcrun simctl create is
      # not a reliable fix on ephemeral runners. ContractConformanceTests exercise
      # contract shape, codegen correctness, and routing logic; none of that varies by
      # destination. iOS-specific paths are guarded by @available and enforced by the
      # compiler regardless of which SDK the test host uses.
      test-command: "xcodebuild -scheme Octomil -destination 'platform=macOS,arch=arm64' -only-testing:OctomilTests/ContractConformanceTests test && python3 .contract/ci/audit-sdks.py --sdk ios --sdk-path . --out parity_report.json"
      parity-report-path: parity_report.json
      parity-score-floor: 60
    secrets: inherit
